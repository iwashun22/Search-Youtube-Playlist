name: Build Rust App

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    timeout-minutes: 45

    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm64
            target: aarch64-unknown-linux-gnu

          # Windows
          - os: windows
            arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-gnu
          - os: windows
            arch: arm64
            runner: windows-2025-arm64
            target: aarch64-pc-windows-msvc

          # macOS
          - os: macos
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - os: macos
            arch: x64
            runner: macos-latest
            target: x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add ${{ matrix.os }} ${{ matrix.arch }} target
        run: rustup target add ${{ matrix.target }}

        # Cache dependencies to speed up + reduce failures
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        env:
          API_TOKEN: ${{ secrets.YOUTUBE_V3_API_TOKEN }}
        run: cargo build --release --target ${{ matrix.target }} -j 1

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/search-yt-pl
