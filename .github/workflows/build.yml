name: Build Rust App

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    timeout-minutes: 45
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: linux
            arch: x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm64
            target: aarch64-unknown-linux-gnu

          # Windows
          - os: windows
            arch: x64
            runner: windows-latest
            target: x86_64-pc-windows-gnu
          - os: windows
            arch: arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc

          # macOS
          - os: macos
            arch: arm64
            runner: macos-latest
            target: aarch64-apple-darwin
          - os: macos
            arch: x64
            runner: macos-latest
            target: x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add ${{ matrix.os }} ${{ matrix.arch }} target
        run: rustup target add ${{ matrix.target }}

        # Cache dependencies to speed up + reduce failures
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        env:
          API_TOKEN: ${{ secrets.YOUTUBE_V3_API_TOKEN }}
        run: cargo build --release --target ${{ matrix.target }} -j 1

      - name: Prepare release artifact
        run: |
          mkdir -p dist
          BIN="search-yt-pl"
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            BIN="${BIN}.exe"
          fi
          PREFIX="${{ matrix.os }}"
          cp target/${{ matrix.target }}/release/$BIN dist/${{ matrix.os }}-${{ matrix.arch }}-$BIN

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
